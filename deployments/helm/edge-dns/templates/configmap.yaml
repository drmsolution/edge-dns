apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "edge-dns.fullname" . }}-config
  namespace: {{ include "edge-dns.namespace" . }}
  labels:
    {{- include "edge-dns.labels" . | nindent 4 }}
    app.kubernetes.io/part-of: edge-dns
data:
  clickhouse-init.sql: |
    CREATE TABLE IF NOT EXISTS default.dns_logs (
      timestamp     DateTime('UTC') DEFAULT now(),
      user_id       String,
      domain        String,
      query_type    String,
      response_code UInt16,
      duration_ms   Float64,
      protocol      String,
      blocked       UInt8 DEFAULT 0,
      client_ip     String DEFAULT '',
      resolver_ip   String DEFAULT ''
    ) ENGINE = MergeTree()
      PARTITION BY toYYYYMM(timestamp)
      ORDER BY (timestamp, user_id)
      TTL timestamp + INTERVAL 90 DAY
      SETTINGS index_granularity = 8192;

  REDIS_ADDR: "{{ include "redis.name" . }}:{{ .Values.redis.service.port }}"
  CLICKHOUSE_ADDR: "{{ include "clickhouse.name" . }}:{{ .Values.clickhouse.service.nativePort }}"
  CLICKHOUSE_DB: "{{ .Values.clickhouse.database }}"
  CLICKHOUSE_USER: "{{ .Values.clickhouse.user }}"
  CLICKHOUSE_PASS: "{{ .Values.clickhouse.password }}"
  METRICS_PORT: ":{{ .Values.edge-dns.metricsPort }}"
  ADMIN_API_ADDR: ":{{ .Values.admin-api.port }}"
