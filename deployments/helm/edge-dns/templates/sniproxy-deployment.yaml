{{- if .Values.sniproxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sniproxy
  namespace: {{ include "edge-dns.namespace" . }}
  labels:
    {{- include "edge-dns.labels" . | nindent 4 }}
    app.kubernetes.io/name: sniproxy
    app.kubernetes.io/part-of: edge-dns
spec:
  replicas: {{ .Values.sniproxy.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.sniproxy.strategy.maxUnavailable }}
      maxSurge: {{ .Values.sniproxy.strategy.maxSurge }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sniproxy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sniproxy
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: edge-dns
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: sniproxy
          image: {{ include "edge-dns.image" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args: ["/app/sniproxy"]
          ports:
            - containerPort: 443
              protocol: TCP
              name: https
          env:
            - name: SNI_PROXY_ADDR
              value: ":{{ .Values.sniproxy.port }}"
          resources:
            {{- toYaml .Values.sniproxy.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.sniproxy.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: {{ .Values.sniproxy.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
{{- end }}
