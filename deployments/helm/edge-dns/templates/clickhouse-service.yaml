apiVersion: v1
kind: Service
metadata:
  name: {{ include "clickhouse.name" . }}
  namespace: {{ include "edge-dns.namespace" . }}
  labels:
    {{- include "edge-dns.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "clickhouse.name" . }}
    app.kubernetes.io/part-of: edge-dns
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.clickhouse.service.httpPort }}
      targetPort: {{ .Values.clickhouse.service.httpPort }}
      protocol: TCP
      name: http
    - port: {{ .Values.clickhouse.service.nativePort }}
      targetPort: {{ .Values.clickhouse.service.nativePort }}
      protocol: TCP
      name: native
  selector:
    app.kubernetes.io/name: {{ include "clickhouse.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
