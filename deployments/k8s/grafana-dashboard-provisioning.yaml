apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: edge-dns
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: edge-dns
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "edge-dns"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
