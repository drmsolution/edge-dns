apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: edge-dns
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: edge-dns
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: edge-dns
