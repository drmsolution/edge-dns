apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: edge-dns
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: edge-dns
spec:
  type: ClusterIP
  ports:
    - port: 8123
      targetPort: 8123
      protocol: TCP
      name: http
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: native
  selector:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/part-of: edge-dns
