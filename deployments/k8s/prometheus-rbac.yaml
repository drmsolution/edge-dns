apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: edge-dns
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: edge-dns
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-edge-dns
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: edge-dns
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - endpoints
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-edge-dns
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: edge-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-edge-dns
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: edge-dns
