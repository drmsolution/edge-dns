version: "3.9"

services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "8123:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./scripts/clickhouse-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  edge-dns:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8053:8053/tcp"
      - "8053:8053/udp"
      - "8443:8443/tcp"
      - "8853:8853/tcp"
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      CLICKHOUSE_ADDR: clickhouse:9000
      STD_ADDR: ":8053"
      DOH_ADDR: ":8443"
      DOT_ADDR: ":8853"

  admin-api:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/admin-api"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      CLICKHOUSE_ADDR: clickhouse:9000
      ADMIN_API_ADDR: ":8080"

  sniproxy:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/sniproxy"]
    restart: unless-stopped
    ports:
      - "443:443/tcp"
    environment:
      SNI_PROXY_ADDR: ":443"

volumes:
  redis_data:
  clickhouse_data:
